service: "BentoService.modelservice:Detector"
name: "war-detector"
labels:
  owner: "GontikTechnologies"
  project: "war-tech-detection"
  stage: not-ready
include:
  - "BentoService/config.py"
  - "BentoService/modelservice.py"
exclude:
  - "BentoService/testnames.py"
  - "BentoService/bentomodel.py"
  - "opencv-python==4.13.0.92"
python:
  packages:
    - "ultralytics"
    - "bentoml"
    - "pillow"
    - "pathlib"
    - "typing"
    - "flatbuffers==25.12.19"
    - "ml-dtypes==0.5.4"
    - "onnx==1.20.1"
    - "onnxruntime==1.24.2"
    - "protobuf==6.33.5"
envs: 
  - name: "USER"
    value: "admin"
  - name: "API_KEY"
    value: "nothing"
models:
  - "yoloe_detector:latest"
docker:
  distro: debian
  python_version: "3.12.12"
