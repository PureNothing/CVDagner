volumes:
  sql_data:
  minio_data:
  kafka_data:
  kafka_secrets:
  kafka_config:
  pgadmin_data:
  redis_data:

networks:
  dbnet:
    driver: bridge

services:
  war-detector:
    image: war-detector:fixed
    container_name: war-detector
    networks:
      - dbnet
    ports:
      - "0.0.0.0:7777:3000"
    restart: unless-stopped
    mem_limit: 1G
    cpus: '1'

  postgres:
    image: postgres:15
    container_name: postgres
    env_file:
      - .env
    volumes:
      - sql_data:/var/lib/postgresql/data
    networks:
      - dbnet
    ports:
      - "0.0.0.0:5432:5432"
    restart: unless-stopped
    mem_limit: 512M
    cpus: '0.5'
    shm_size: 128M

  redis:
    image: "redis:latest"
    volumes:
      - redis_data:/data
    networks:
      - dbnet
    ports:
      - "0.0.0.0:6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    env_file:
      - .env
    volumes:
      - minio_data:/data
    networks:
      - dbnet
    ports:
      - "0.0.0.0:9000:9000"
      - "0.0.0.0:9001:9001"
    command: server /data --console-address ":9001"
    restart: unless-stopped
    mem_limit: 512M
    cpus: '0.5'
    shm_size: 128M

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    volumes:
      - kafka_data:/var/lib/kafka/data
      - kafka_secrets:/etc/kafka/secrets
      - kafka_config:/mnt/shared/config
    networks:
      - dbnet
    ports:
      - "127.0.0.1:9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_HOST://kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    restart: unless-stopped
    mem_limit: 512M
    cpus: '0.5'

  kafbat:
    image: ghcr.io/kafbat/kafka-ui
    container_name: kafbat
    ports:
      - "8090:8080"
    networks:
      - dbnet
    environment:
      KAFKA_CLUSTERS_0_NAME: war
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
      AUTH_TYPE: "LOGIN_FORM"
    env_file:
      - .env
    depends_on:
      - kafka
    restart: unless-stopped
    mem_limit: 256M
    cpus: '0.2'

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    env_file:
      - .env
    environment:
      - LOG_LEVEL=DEBUG
    ports:
      - "0.0.0.0:5050:80"
    networks:
      - dbnet
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    mem_limit: 256M
    cpus: '0.2'
